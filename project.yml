name: DeepClean
options:
  bundleIdPrefix: com.deepclean
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.deepclean.app
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  DeepClean:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DeepClean
        excludes:
          - "**/*.plist"
          - "**/*.xcassets"
    resources:
      - path: DeepClean/Assets.xcassets
    # Use INFOPLIST_FILE build setting — do NOT use info: path: here.
    # xcodegen overwrites the file when info: is specified, stripping our
    # privacy usage descriptions and causing TCC crash on launch.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deepclean.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: DeepClean/Info.plist
        GENERATE_INFOPLIST_FILE: NO
