name: DeepClean
options:
  bundleIdPrefix: com.deepclean
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.deepclean.app
    INFOPLIST_FILE: DeepClean/Info.plist
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    SWIFT_STRICT_CONCURRENCY: minimal
    LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
    WEAK_FRAMEWORKS: "Vision Accelerate"

targets:
  DeepClean:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DeepClean
        excludes:
          - "**/*.plist"
    info:
      path: DeepClean/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deepclean.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
