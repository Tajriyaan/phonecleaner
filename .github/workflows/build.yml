name: Build DeepClean IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build archive (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project DeepClean.xcodeproj \
            -scheme DeepClean \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/DeepClean.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
          | xcpretty

      - name: Verify app bundle exists
        run: |
          APP="$RUNNER_TEMP/DeepClean.xcarchive/Products/Applications/DeepClean.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: DeepClean.app not found in archive"
            ls "$RUNNER_TEMP/DeepClean.xcarchive/Products/Applications/" || true
            exit 1
          fi
          echo "App bundle size:"
          du -sh "$APP"
          echo "App binary exists:"
          ls -lh "$APP/DeepClean"

      - name: Package IPA (preserve symlinks with ditto)
        run: |
          mkdir -p "$RUNNER_TEMP/Payload"
          # Use ditto — Apple's tool that preserves symlinks and resource forks correctly
          ditto "$RUNNER_TEMP/DeepClean.xcarchive/Products/Applications/DeepClean.app" \
                "$RUNNER_TEMP/Payload/DeepClean.app"
          cd "$RUNNER_TEMP"
          # -y flag preserves symlinks in the zip archive (required for valid IPA)
          zip -r -y DeepClean.ipa Payload
          echo "IPA size: $(du -sh DeepClean.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeepClean-IPA
          path: ${{ runner.temp }}/DeepClean.ipa
          retention-days: 14
