name: Build DeepClean IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Show generated project
        run: ls -la DeepClean.xcodeproj/

      - name: Build archive (unsigned)
        run: |
          xcodebuild \
            -project DeepClean.xcodeproj \
            -scheme DeepClean \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/DeepClean.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Package IPA
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          cp -r "$RUNNER_TEMP/DeepClean.xcarchive/Products/Applications/DeepClean.app" \
                "$RUNNER_TEMP/Payload/DeepClean.app"
          cd $RUNNER_TEMP
          zip -r DeepClean.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DeepClean-IPA
          path: ${{ runner.temp }}/DeepClean.ipa
          retention-days: 14
