name: Build DeepClean IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build archive (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project DeepClean.xcodeproj \
            -scheme DeepClean \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/DeepClean.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
          | xcpretty

      - name: Package IPA
        run: |
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$RUNNER_TEMP/DeepClean.xcarchive/Products/Applications/DeepClean.app" \
                "$RUNNER_TEMP/Payload/DeepClean.app"
          cd "$RUNNER_TEMP"
          zip -r DeepClean.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeepClean-IPA
          path: ${{ runner.temp }}/DeepClean.ipa
          retention-days: 14
